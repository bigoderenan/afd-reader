services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: afd-reader_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - labrbigode

  nginx:
    image: nginx:1.27-alpine
    container_name: afd-reader_nginx
    depends_on:
      - php
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - labrbigode

networks:
  labrbigode:
    external: true
